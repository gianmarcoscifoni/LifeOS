name: Backend CI

on:
  push:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'backend/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/LifeOS.Api

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release --verbosity normal

      - name: Docker build
        if: github.ref == 'refs/heads/main'
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/lifeos-api:${{ github.sha }} .
        working-directory: backend/LifeOS.Api

      - name: Docker push
        if: github.ref == 'refs/heads/main'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker push ghcr.io/${{ github.repository_owner }}/lifeos-api:${{ github.sha }}
          docker tag ghcr.io/${{ github.repository_owner }}/lifeos-api:${{ github.sha }} \
                     ghcr.io/${{ github.repository_owner }}/lifeos-api:latest
          docker push ghcr.io/${{ github.repository_owner }}/lifeos-api:latest
        working-directory: backend/LifeOS.Api
