name: Frontend CI

on:
  push:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    paths:
      - 'frontend/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'http://localhost:5000' }}
          NEXT_PUBLIC_API_KEY: ${{ secrets.NEXT_PUBLIC_API_KEY || 'lifeos-dev-key' }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET || 'ci-placeholder-secret-for-build' }}
          AUTH_GITHUB_ID: ${{ secrets.AUTH_GITHUB_ID || 'placeholder' }}
          AUTH_GITHUB_SECRET: ${{ secrets.AUTH_GITHUB_SECRET || 'placeholder' }}
